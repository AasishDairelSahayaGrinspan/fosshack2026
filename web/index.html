<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Unravel - A mental wellness app designed to help you understand and manage your thoughts.">
  <meta name="theme-color" content="#3A86FF">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="unravel">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>unravel</title>
  <link rel="manifest" href="manifest.json">

  <!-- OAuth Callback Handler -->
  <script>
    // Handle OAuth callback redirects from Appwrite
    // This captures OAuth authentication responses and passes them to Flutter
    (function() {
      // Check for OAuth callback parameters in URL
      const urlParams = new URLSearchParams(window.location.search);
      const urlHash = window.location.hash;
      
      // Log OAuth callback for debugging
      if (urlHash || urlParams.has('code') || urlParams.has('error')) {
        console.log('[OAuth Callback]', {
          hash: urlHash,
          search: window.location.search,
          code: urlParams.get('code'),
          error: urlParams.get('error'),
          state: urlParams.get('state'),
          url: window.location.href
        });
        
        // Store callback data for Flutter to retrieve
        window.__oauthCallback = {
          success: !urlParams.has('error'),
          code: urlParams.get('code'),
          error: urlParams.get('error'),
          state: urlParams.get('state'),
          timestamp: new Date().toISOString()
        };
      }

      // Cleanup: Remove OAuth parameters from URL after processing
      // This prevents issues with page reloads and keeps URL clean
      if (urlParams.has('code') || urlParams.has('error') || urlParams.has('state')) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
