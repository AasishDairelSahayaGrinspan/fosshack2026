name: unravel
description: "Unravel - Slow down. You're safe here. A premium mental wellness app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  image_picker: ^1.1.2
  share_plus: ^12.0.1
  appwrite: ^22.0.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.4.0
  app_settings: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/lottie/
