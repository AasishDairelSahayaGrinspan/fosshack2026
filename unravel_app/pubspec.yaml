name: unravel_app
description: "Unravel - A mental well-being application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3

  # Networking
  dio: ^5.4.3+1

  # Avatar / Animation
  rive: ^0.13.4

  # Audio
  just_audio: ^0.9.37

  # Charts
  fl_chart: ^0.68.0

  # Health data
  health: ^10.2.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3

  # Auth / Security
  flutter_secure_storage: ^9.2.2

  # Encryption
  encrypt: ^5.0.3

  # Date utilities
  intl: ^0.19.0

  # UUID
  uuid: ^4.4.0

  # JSON
  json_annotation: ^4.9.0

  # Freezed
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/rive/
