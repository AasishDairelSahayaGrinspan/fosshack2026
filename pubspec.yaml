name: unravel
description: "Unravel - Slow down. You're safe here. A premium mental wellness app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  image_picker: ^1.1.2
  share_plus: ^12.0.1
  appwrite: ^22.0.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.4.0
  just_audio: ^0.9.42
  app_settings: ^6.1.1
  url_launcher: ^6.2.5
  timezone: ^0.10.0
  lottie: ^3.3.1
  geolocator: ^13.0.2
  pedometer_2: ^5.0.4
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/lottie/
    - assets/logo.png
    - assets/google_icon.png
    - assets/music/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
