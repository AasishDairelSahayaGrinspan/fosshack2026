name: unravel
description: "Unravel - Slow down. You're safe here. A premium mental wellness app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  image_picker: ^1.1.2
  share_plus: ^12.0.1
  appwrite: ^22.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#D4AACC"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
